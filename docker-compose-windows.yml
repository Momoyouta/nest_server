services:
  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: always
    ports:
      - "80:80"    # 暴露宿主机的 80 端口
    volumes:
      # 1. 挂载前端打包好的静态文件到 Nginx 目录
      - ../study_platform_frontend/dist:/usr/share/nginx/html/client:ro
      - ../study_platform_admin_frontend/dist:/usr/share/nginx/html/admin:ro
      # 2. 挂载文件存储目录 (视频切片资源)
      - ../fileStore:/usr/share/nginx/html/fileStore:ro
      # 3. 挂载 Nginx 配置文件 (注意这里指向了 study_platform_frontend 里的配置)
      - ../study_platform_frontend/nginx-windows.conf:/etc/nginx/conf.d/default.conf:ro